services:
  postgres:
    image: postgres:16-alpine
    container_name: optomitron-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: optomitron
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - optomitron-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d optomitron"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  optomitron-postgres-data:
