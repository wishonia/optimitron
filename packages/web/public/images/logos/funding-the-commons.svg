<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 192" fill="white">
  <!-- Funding the Commons logo - molecular network icon + wordmark -->
  <!-- White on transparent, designed for dark backgrounds -->

  <defs>
    <mask id="icon-mask">
      <!-- White = visible, black = hidden -->
      <rect width="170" height="170" fill="white"/>
      <!-- Punch holes in hollow nodes -->
      <circle cx="20" cy="19" r="7" fill="black"/>
      <circle cx="132" cy="17" r="7" fill="black"/>
      <circle cx="77" cy="77" r="5" fill="black"/>
      <circle cx="16" cy="130" r="7" fill="black"/>
      <circle cx="131" cy="131" r="7" fill="black"/>
    </mask>
  </defs>

  <!-- Icon with mask for transparent holes -->
  <g transform="translate(18,22)" mask="url(#icon-mask)">
    <!-- Bars -->
    <rect x="20" y="12" width="53" height="10" rx="5"/>
    <rect x="15" y="19" width="10" height="56" rx="5"/>
    <rect x="19" y="70" width="58" height="14" rx="5"/>
    <rect x="77" y="70" width="55" height="10" rx="5"/>
    <rect x="14" y="75" width="10" height="55" rx="5"/>
    <rect x="72" y="77" width="10" height="53" rx="5"/>
    <rect x="78" y="125" width="53" height="10" rx="5"/>

    <!-- Solid nodes -->
    <circle cx="73" cy="17" r="19"/>
    <circle cx="19" cy="75" r="16"/>
    <circle cx="132" cy="74" r="16"/>
    <circle cx="78" cy="130" r="19"/>

    <!-- Hollow nodes (outer circles, holes cut by mask) -->
    <circle cx="20" cy="19" r="19"/>
    <circle cx="132" cy="17" r="19"/>
    <circle cx="77" cy="77" r="16"/>
    <circle cx="16" cy="130" r="19"/>
    <circle cx="131" cy="131" r="19"/>
  </g>

  <!-- Text -->
  <text x="212" y="80" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="800" font-size="54" fill="white" letter-spacing="-0.5">Funding the</text>
  <text x="212" y="152" font-family="Rockwell,'Roboto Slab','Courier New',serif" font-weight="800" font-size="68" fill="white" letter-spacing="-0.5">Commons</text>
</svg>
